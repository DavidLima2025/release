<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de Release PM - PMMG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #1a1a1a;
            color: #e0e0e0;
            font-family: 'Roboto', Arial, sans-serif;
            padding: 20px;
            line-height: 1.6;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 768px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
        
        .card {
            background-color: #2a2a2a;
            border: 2px solid #b8860b;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        h1 {
            color: #d4af37;
            margin-bottom: 20px;
            text-align: center;
            font-size: 28px;
        }
        
        h2 {
            color: #d4af37;
            margin-bottom: 15px;
            font-size: 18px;
            border-bottom: 2px solid #b8860b;
            padding-bottom: 10px;
        }
        
        h3 {
            color: #d4af37;
            margin-top: 15px;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        label {
            display: block;
            margin-bottom: 5px;
            color: #d4af37;
            font-weight: bold;
            font-size: 13px;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            background-color: #1a1a1a;
            border: 1px solid #b8860b;
            color: #e0e0e0;
            border-radius: 4px;
            font-family: 'Roboto', Arial, sans-serif;
        }
        
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #d4af37;
            box-shadow: 0 0 5px rgba(212, 175, 55, 0.3);
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }
        
        button {
            background-color: #b8860b;
            color: #000;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            margin-right: 10px;
            margin-bottom: 10px;
            transition: background-color 0.3s;
        }
        
        button:hover {
            background-color: #d4af37;
        }
        
        button:disabled {
            background-color: #666;
            cursor: not-allowed;
            color: #999;
        }
        
        .btn-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }
        
        .btn-small {
            padding: 8px 12px;
            font-size: 12px;
            margin-right: 5px;
        }
        
        .btn-danger {
            background-color: #666;
        }
        
        .btn-danger:hover {
            background-color: #888;
        }
        
        .preview {
            background-color: #000;
            border: 1px solid #b8860b;
            padding: 15px;
            border-radius: 4px;
            max-height: 400px;
            overflow-y: auto;
            margin-bottom: 15px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #d4af37;
            line-height: 1.4;
        }
        
        .item-list {
            background-color: #1a1a1a;
            border: 1px solid #b8860b;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 10px;
        }
        
        .item {
            background-color: #2a2a2a;
            padding: 8px;
            margin-bottom: 5px;
            border-left: 3px solid #b8860b;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .item button {
            margin: 0;
            padding: 4px 8px;
            font-size: 11px;
        }
        
        .toggle-btn {
            background-color: #666;
            padding: 10px 15px;
            margin: 5px;
        }
        
        .toggle-btn.active {
            background-color: #b8860b;
            color: #000;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- FORMULÁRIO -->
        <div>
            <h1>🔺 GERADOR DE RELEASE PM 🔺</h1>
            
            <div class="card">
                <h2>CIA PMMG</h2>
                <select id="cia">
                    <option value="1ª RPM">1ª RPM</option>
                    <option value="2ª RPM">2ª RPM</option>
                    <option value="3ª RPM">3ª RPM</option>
                    <option value="4ª RPM">4ª RPM</option>
                    <option value="5ª RPM">5ª RPM</option>
                    <option value="6ª RPM">6ª RPM</option>
                </select>
            </div>
            
            <div class="card">
                <h2>NATUREZA</h2>
                <input type="text" id="natureza" placeholder="Ex: FURTO, ROUBO, TRÁFICO...">
            </div>
            
            <div class="card">
                <h2>INFORMAÇÕES BÁSICAS</h2>
                <label>Local</label>
                <input type="text" id="local" placeholder="Ex: RUA GUARANI, 390">
                
                <label>REDS</label>
                <input type="text" id="reds" placeholder="Ex: 2026-011501710-001">
                
                <label>Hora</label>
                <input type="time" id="hora">
            </div>
            
            <div class="card">
                <h2>EQUIPE PRINCIPAL</h2>
                <label>Tipo</label>
                <select id="equipeTipo">
                    <option value="GT">GT (Moto)</option>
                    <option value="VIATURA">VIATURA</option>
                    <option value="BICICLETA">BICICLETA</option>
                    <option value="A PÉ">A PÉ</option>
                </select>
                
                <label>Nome da Guarnição</label>
                <input type="text" id="equipeNome" placeholder="Ex: GT6, GEPAR 6">
                
                <h3>Militares</h3>
                <input type="text" id="novoMilitar" placeholder="Nome do militar">
                <button onclick="adicionarMilitar()">+ Adicionar Militar</button>
                <div class="item-list" id="militaresList"></div>
            </div>
            
            <div class="card">
                <h2>APOIO</h2>
                <label>Tipo de Equipe</label>
                <select id="apoioTipo" onchange="atualizarApoioLabel()">
                    <option value="OLHO VIVO">👁️ OLHO VIVO</option>
                    <option value="P2">🕵️ P2</option>
                    <option value="VIATURA">VIATURA</option>
                    <option value="MOTO">MOTO</option>
                </select>
                
                <label id="nomeApoioLabel">Nome da Guarnição</label>
                <input type="text" id="apoioNome" placeholder="Ex: GEPAR 6">
                
                <h3>Militares</h3>
                <input type="text" id="novoApoioMilitar" placeholder="Nome do militar">
                <button onclick="adicionarApoioMilitar()">+ Adicionar Militar</button>
                <div class="item-list" id="apoioMilitaresList"></div>
                
                <button onclick="adicionarApoio()">+ Adicionar Equipe de Apoio</button>
                <div class="item-list" id="apoioList"></div>
            </div>
            
            <div class="card">
                <h2>RECURSOS ESPECIAIS</h2>
                <button class="toggle-btn" id="olhoVivoBtn" onclick="toggleOlhoVivo()">👁️ OLHO VIVO</button>
                <button class="toggle-btn" id="p2Btn" onclick="toggleP2()">🕵️ P2</button>
            </div>
            
            <div class="card">
                <h2>MATERIAL APREENDIDO</h2>
                <input type="text" id="novoMaterial" placeholder="Ex: 8 PRODUTOS PARA CABELO">
                <button onclick="adicionarMaterial()">+ Adicionar Material</button>
                <div class="item-list" id="materialList"></div>
            </div>
            
            <div class="card">
                <h2>AUTOR(ES) PRESO(S)</h2>
                <input type="text" id="novoAutor" placeholder="Nome do autor">
                <button onclick="adicionarAutor()">+ Adicionar Autor</button>
                <div class="item-list" id="autorList"></div>
            </div>
            
            <div class="card">
                <h2>HISTÓRICO</h2>
                <textarea id="historico" placeholder="Descreva os detalhes da ocorrência..."></textarea>
            </div>
        </div>
        
        <!-- PREVIEW -->
        <div>
            <h1>📱 PREVIEW</h1>
            <div class="preview" id="preview">Clique em "Gerar Release" para ver o resultado...</div>
            <button onclick="gerarRelease()" style="width: 100%; margin-bottom: 10px;">🔄 Gerar Release</button>
            <button onclick="copiarWhatsApp()" style="width: 100%; background-color: #25d366; margin-bottom: 10px;">📱 Copiar para WhatsApp</button>
            <button onclick="baixarTXT()" style="width: 100%; background-color: #4CAF50;">📥 Baixar TXT</button>
        </div>
    </div>

    <script>
        let militares = [];
        let apoioMilitares = [];
        let apoios = [];
        let materiais = [];
        let autores = [];
        let temOlhoVivo = false;
        let temP2 = false;

        function atualizarApoioLabel() {
            const tipo = document.getElementById('apoioTipo').value;
            const nomeLabel = document.getElementById('nomeApoioLabel');
            const nomeInput = document.getElementById('apoioNome');
            if (tipo === 'OLHO VIVO' || tipo === 'P2') {
                nomeLabel.style.display = 'none';
                nomeInput.style.display = 'none';
            } else {
                nomeLabel.style.display = 'block';
                nomeInput.style.display = 'block';
            }
        }

        function adicionarMilitar() {
            const nome = document.getElementById('novoMilitar').value.trim().toUpperCase();
            if (nome) {
                militares.push(nome);
                document.getElementById('novoMilitar').value = '';
                atualizarMilitaresList();
                gerarRelease();
            }
        }

        function removerMilitar(index) {
            militares.splice(index, 1);
            atualizarMilitaresList();
            gerarRelease();
        }

        function atualizarMilitaresList() {
            const list = document.getElementById('militaresList');
            list.innerHTML = militares.map((m, i) => 
                `<div class="item">👮🏻‍♂️ ${m} <button class="btn-small btn-danger" onclick="removerMilitar(${i})">✕</button></div>`
            ).join('');
        }

        function adicionarApoioMilitar() {
            const nome = document.getElementById('novoApoioMilitar').value.trim().toUpperCase();
            if (nome) {
                apoioMilitares.push(nome);
                document.getElementById('novoApoioMilitar').value = '';
                atualizarApoioMilitaresList();
                gerarRelease();
            }
        }

        function removerApoioMilitar(index) {
            apoioMilitares.splice(index, 1);
            atualizarApoioMilitaresList();
            gerarRelease();
        }

        function atualizarApoioMilitaresList() {
            const list = document.getElementById('apoioMilitaresList');
            list.innerHTML = apoioMilitares.map((m, i) => 
                `<div class="item">👮🏻‍♂️ ${m} <button class="btn-small btn-danger" onclick="removerApoioMilitar(${i})">✕</button></div>`
            ).join('');
        }

        function adicionarApoio() {
            const tipo = document.getElementById('apoioTipo').value;
            const nome = document.getElementById('apoioNome').value.trim().toUpperCase();
            
            if (tipo === 'OLHO VIVO' || tipo === 'P2') {
                if (apoioMilitares.length > 0) {
                    const apoio = {
                        tipo: tipo,
                        nome: '',
                        militares: apoioMilitares.slice()
                    };
                    apoios.push(apoio);
                    apoioMilitares = [];
                    document.getElementById('apoioNome').value = '';
                    atualizarApoioMilitaresList();
                    atualizarApoioList();
                    gerarRelease();
                } else {
                    alert('Adicione pelo menos um militar antes de adicionar a equipe de apoio');
                }
            } else {
                if (nome && apoioMilitares.length > 0) {
                    const apoio = {
                        tipo: tipo,
                        nome: nome,
                        militares: apoioMilitares.slice()
                    };
                    apoios.push(apoio);
                    apoioMilitares = [];
                    document.getElementById('apoioNome').value = '';
                    atualizarApoioMilitaresList();
                    atualizarApoioList();
                    gerarRelease();
                } else {
                    alert('Preencha o nome da guarnição e adicione militares');
                }
            }
        }

        function removerApoio(index) {
            apoios.splice(index, 1);
            atualizarApoioList();
            gerarRelease();
        }

        function atualizarApoioList() {
            const list = document.getElementById('apoioList');
            list.innerHTML = apoios.map((a, i) => 
                `<div class="item">${a.tipo} ${a.nome} (${a.militares.length} militares) <button class="btn-small btn-danger" onclick="removerApoio(${i})">✕</button></div>`
            ).join('');
        }

        function adicionarMaterial() {
            const material = document.getElementById('novoMaterial').value.trim().toUpperCase();
            if (material) {
                materiais.push(material);
                document.getElementById('novoMaterial').value = '';
                atualizarMaterialList();
                gerarRelease();
            }
        }

        function removerMaterial(index) {
            materiais.splice(index, 1);
            atualizarMaterialList();
            gerarRelease();
        }

        function atualizarMaterialList() {
            const list = document.getElementById('materialList');
            list.innerHTML = materiais.map((m, i) => 
                `<div class="item">📦 ${m} <button class="btn-small btn-danger" onclick="removerMaterial(${i})">✕</button></div>`
            ).join('');
        }

        function adicionarAutor() {
            const autor = document.getElementById('novoAutor').value.trim().toUpperCase();
            if (autor) {
                autores.push(autor);
                document.getElementById('novoAutor').value = '';
                atualizarAutorList();
                gerarRelease();
            }
        }

        function removerAutor(index) {
            autores.splice(index, 1);
            atualizarAutorList();
            gerarRelease();
        }

        function atualizarAutorList() {
            const list = document.getElementById('autorList');
            list.innerHTML = autores.map((a, i) => 
                `<div class="item">🔗 ${a} <button class="btn-small btn-danger" onclick="removerAutor(${i})">✕</button></div>`
            ).join('');
        }

        function toggleOlhoVivo() {
            temOlhoVivo = !temOlhoVivo;
            document.getElementById('olhoVivoBtn').classList.toggle('active');
            gerarRelease();
        }

        function toggleP2() {
            temP2 = !temP2;
            document.getElementById('p2Btn').classList.toggle('active');
            gerarRelease();
        }

        function gerarRelease() {
            const cia = document.getElementById('cia').value;
            const natureza = document.getElementById('natureza').value.toUpperCase();
            const local = document.getElementById('local').value.toUpperCase();
            const reds = document.getElementById('reds').value;
            const hora = document.getElementById('hora').value;
            const equipeTipo = document.getElementById('equipeTipo').value;
            const equipeNome = document.getElementById('equipeNome').value.toUpperCase();
            const historico = document.getElementById('historico').value.toUpperCase();

            let texto = '';
            texto += `🔺 *${cia}* 🔺\n`;
            texto += `*1° BATALHÃO PM*\n`;
            texto += `*6ª CIA PMMG*\n\n`;

            if (natureza) texto += `⚖️ *${natureza}*\n`;
            if (local) texto += `📍 *${local}*\n`;
            if (reds) texto += `📋 *REDS:* ${reds}\n`;
            if (hora) texto += `⏰ ${hora}\n\n`;

            if (equipeTipo && equipeNome) {
                const emoji = equipeTipo === 'GT' ? '🏍️' : '🚓';
                texto += `${emoji} *${equipeTipo} ${equipeNome}*\n`;
                militares.forEach(m => texto += `👮🏻‍♂️ ${m}\n`);
                texto += '\n';
            }

            apoios.forEach(a => {
                const emoji = a.tipo === 'OLHO VIVO' ? '👁️' : '🕵️';
                texto += `${emoji} *${a.tipo}*`;
                if (a.nome) texto += ` ${a.nome}`;
                texto += '\n';
                a.militares.forEach(m => texto += `👮🏻‍♂️ ${m}\n`);
            });

            if (temOlhoVivo) texto += `👁️ *OLHO VIVO*\n`;
            if (temP2) texto += `🕵️ *P2*\n`;

            if (materiais.length > 0) {
                texto += `\n📦 *MATERIAL APREENDIDO:*\n`;
                materiais.forEach(m => texto += `${m}\n`);
            }

            if (autores.length > 0) {
                texto += `\n🔗 *AUTOR(ES) PRESO(S):*\n`;
                autores.forEach(a => texto += `🔗 ${a}\n`);
            }

            if (historico) {
                texto += `\n📜 *HISTÓRICO:*\n${historico}\n`;
            }

            texto += `\n🔺 6 CIA PM - AQUI SE FORJAM HERÓIS BELORIZONTINOS!!!🔺\n`;
            texto += `🔺 135 ANOS DO 1º BATALHÃO: PASSADO QUE INSPIRA, PRESENTE QUE PROTEGE.🔺`;

            document.getElementById('preview').textContent = texto;
        }

        function copiarWhatsApp() {
            const preview = document.getElementById('preview').textContent;
            navigator.clipboard.writeText(preview).then(() => {
                alert('✅ Copiado para a área de transferência!\n\nAgora é só colar no WhatsApp!');
            }).catch(() => {
                alert('Erro ao copiar. Tente selecionar o texto manualmente.');
            });
        }

        function baixarTXT() {
            const preview = document.getElementById('preview').textContent;
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(preview));
            element.setAttribute('download', 'release_pm.txt');
            element.style.display = 'none';
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);
        }

        // Inicializar
        atualizarApoioLabel();
        gerarRelease();
    </script>
</body>
</html>
